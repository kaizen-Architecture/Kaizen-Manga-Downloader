on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      promote_to_production:
        description: 'Promocionar a Producción (Generar tags definitivos latest y vX)'
        type: boolean
        required: true
        default: false
name: release-please
permissions:
  contents: write
  pull-requests: write
  packages: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - uses: pnpm/action-setup@v3
        name: Install pnpm
        id: pnpm-install
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

  release-please:
    outputs:
      release_major: ${{ steps.release.outputs.major }}
      release_minor: ${{ steps.release.outputs.minor }}
      release_patch: ${{ steps.release.outputs.patch }}
      release_created: ${{ steps.release.outputs.release_created }}
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Release
        uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: node
          command: manifest

  build-and-push:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Packages
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Staging Images
        uses: docker/build-push-action@v4
        if: ${{ github.event.inputs.promote_to_production != 'true' }}
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kaizen-manga-downloader:staging-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kaizen-manga-downloader:staging-v1.7.0
            ghcr.io/kaizen-architecture/kaizen-manga-downloader:staging-latest
            ghcr.io/kaizen-architecture/kaizen-manga-downloader:staging-v1.7.0

      - name: Build Production Images
        uses: docker/build-push-action@v4
        if: ${{ github.event.inputs.promote_to_production == 'true' }}
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kaizen-manga-downloader:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kaizen-manga-downloader:v1.7.0
            ${{ secrets.DOCKERHUB_USERNAME }}/kaizen-manga-downloader:v25-kaizen
            ghcr.io/kaizen-architecture/kaizen-manga-downloader:latest
            ghcr.io/kaizen-architecture/kaizen-manga-downloader:v1.7.0

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
